name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Authenticate to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/portfolio-nginx:latest .
          docker push $REGISTRY/portfolio-nginx:latest

      - name: Deploy via SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --region eu-central-1 \
            --parameters "{\"commands\":[\"aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin $REGISTRY\",
            \"docker pull $REGISTRY/portfolio-nginx:latest\",
            \"docker stop portfolio-nginx || true\",
            \"docker rm portfolio-nginx || true\",
            \"docker run -d --name portfolio-nginx --restart unless-stopped -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro $REGISTRY/portfolio-nginx:latest\"]}"