server {
    listen 80;
    server_name lopezberg.dev www.lopezberg.dev;
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name lopezberg.dev www.lopezberg.dev;
    
    # SSL certificate paths
    ssl_certificate /etc/letsencrypt/live/lopezberg.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lopezberg.dev/privkey.pem;
    
    # SSL configuration (modern, secure settings)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    
    # Root directory for website files
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}
